<script src="https://accounts.google.com/gsi/client" async defer data-component-script="true"></script>
<script data-component-script="true">
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    localStorage.setItem('yukti-auth-token', 'true');
    window.location.hash = '#dashboard';
  });

  const googleBtn = document.getElementById('google-sso-btn');
  if (googleBtn) {
    googleBtn.addEventListener('click', () => {
      const client = google.accounts.oauth2.initCodeClient({
        client_id: '98512503675-m0ih7ngfrj0u33g4u284ocsq7da5ukmg.apps.googleusercontent.com',
        scope: 'email profile',
        ux_mode: 'popup',
        callback: async (response) => {
          if (response.code) {
            try {
              const res = await fetch('http://localhost:3000/api/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: response.code })
              });

              if (res.ok) {
                const data = await res.json();
                if (data.success) {
                  localStorage.setItem('yukti-auth-token', 'true');
                  window.location.hash = '#dashboard';
                }
              } else {
                const err = await res.json();
                console.error('Auth failure:', err);
                alert('Authentication backend error: ' + (err.error || 'Unknown error'));
              }
            } catch (err) {
              console.error('Cannot reach backend', err);
              alert('Could not reach backend identity server. Ensure it is running on port 3000.');
            }
          }
        },
      });
      client.requestCode();
    });
  }
</script>
