  <!-- ═══════════ ROUTER SCRIPT ═══════════ -->
  <script>
    const pages = {
      landing: '/pages/landing.html',
      dashboard: '/pages/dashboard.html',
      quiz: '/pages/quiz.html',
      games: '/pages/games.html',
      map: '/pages/map.html',
      progress: '/pages/progress.html',
      teacher: '/pages/teacher.html',
      chatbot: '/pages/chatbot.html',
    };

    const pageCache = {};
    const contentEl = document.getElementById('page-content');
    const loaderEl = document.getElementById('page-loader');
    let currentPage = null;

    // Extract body content from full HTML page
    function extractBody(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      // Remove the page's own nav (we have global nav)
      const navElements = doc.querySelectorAll('nav');
      navElements.forEach(n => {
        // Only remove nav if it's a top-level fixed nav
        if (n.classList.contains('fixed') && n.closest('body') === doc.body) {
          n.remove();
        }
      });
      return doc.body.innerHTML;
    }

    // Extract and run scripts from HTML
    function executeScripts(container) {
      const scripts = container.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    }

    // Re-initialize intersection observers for scroll animations
    function initScrollAnimations() {
      const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
      };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-fade-up');
            entry.target.classList.remove('opacity-0');
          }
        });
      }, observerOptions);
      document.querySelectorAll('#page-content .opacity-0').forEach(el => observer.observe(el));
    }

    // Load a page
    async function loadPage(pageName) {
      if (pageName === currentPage) return;
      if (!pages[pageName]) pageName = 'landing';

      currentPage = pageName;

      // Page exit animation
      contentEl.classList.add('page-exit');

      // Show loader for uncached pages
      let showLoader = false;
      if (!pageCache[pageName]) {
        showLoader = true;
        setTimeout(() => {
          if (showLoader) {
            loaderEl.style.display = 'flex';
          }
        }, 200);
      }

      // Wait for exit animation
      await new Promise(r => setTimeout(r, 350));

      // Fetch page if not cached
      if (!pageCache[pageName]) {
        try {
          const resp = await fetch(pages[pageName]);
          const html = await resp.text();
          pageCache[pageName] = extractBody(html);
        } catch (err) {
          pageCache[pageName] = `<div class="flex items-center justify-center min-h-screen"><p class="text-error">Failed to load page.</p></div>`;
        }
      }

      showLoader = false;
      loaderEl.style.display = 'none';

      // Insert content
      contentEl.innerHTML = pageCache[pageName];

      // Execute inline scripts
      executeScripts(contentEl);

      // Reset scroll
      window.scrollTo({ top: 0, behavior: 'instant' });

      // Page enter animation
      contentEl.classList.remove('page-exit');
      contentEl.classList.add('page-enter');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          contentEl.classList.remove('page-enter');
        });
      });

      // Re-init scroll animations
      setTimeout(initScrollAnimations, 100);

      // Update active nav link
      updateActiveNav(pageName);

      // Close mobile menu if open
      closeMobileMenu();
    }

    // Update active nav link styling
    function updateActiveNav(pageName) {
      document.querySelectorAll('.nav-link, .mobile-nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.page === pageName) {
          link.classList.add('active');
        }
      });
    }

    // Hash-based routing
    function handleRoute() {
      const hash = window.location.hash.slice(1) || 'landing';
      loadPage(hash);
    }

    window.addEventListener('hashchange', handleRoute);

    // Mobile menu
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileOverlay = document.getElementById('mobile-overlay');
    const mobileToggle = document.getElementById('mobile-toggle');
    const mobileClose = document.getElementById('mobile-close');

    function openMobileMenu() {
      mobileMenu.classList.add('open');
      mobileOverlay.style.display = 'block';
      requestAnimationFrame(() => { mobileOverlay.style.opacity = '1'; });
      document.body.style.overflow = 'hidden';
    }

    function closeMobileMenu() {
      mobileMenu.classList.remove('open');
      mobileOverlay.style.opacity = '0';
      setTimeout(() => { mobileOverlay.style.display = 'none'; }, 300);
      document.body.style.overflow = '';
    }

    mobileToggle.addEventListener('click', openMobileMenu);
    mobileClose.addEventListener('click', closeMobileMenu);
    mobileOverlay.addEventListener('click', closeMobileMenu);

    // Nav hide/show on scroll
    let lastScroll = 0;
    const mainNav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll > lastScroll && currentScroll > 80) {
        mainNav.style.transform = 'translateY(-100%)';
        mainNav.style.transition = 'transform 0.35s ease';
      } else {
        mainNav.style.transform = 'translateY(0)';
      }
      lastScroll = currentScroll;
    });

    // Initial load
    handleRoute();
  </script>
